<table
  role="presentation"
  width="100%"
  border="0"
  cellpadding="0"
  cellspacing="0"
  style="border-collapse: collapse; margin: 0 auto; max-width: 560px;"
>
  <tr>
    <td style="padding: 24px; background: #f8fafc; border: 1px solid #dbe7f3; border-radius: 12px;">
      <p style="margin: 0 0 8px; font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em;">
        {{ newsletter.kicker }}
      </p>

      <h2 style="margin: 0 0 12px; font-family: Arial, Helvetica, sans-serif; font-size: 26px; line-height: 1.25; color: #0f172a;">
        {{ newsletter.title }}
      </h2>

      <p style="margin: 0 0 16px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 1.6; color: #334155;">
        {{ newsletter.summary }}
      </p>

      {{ newsletter.image_block_html }}

      <div style="margin: 0 0 18px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 1.7; color: #334155;">
        {{ newsletter.body_html }}
      </div>

      <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate;">
        <tr>
          <td style="background: #0b6bcb; border-radius: 999px;">
            <a
              href="{{ newsletter.cta_url }}"
              target="_blank"
              style="display: inline-block; padding: 12px 20px; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; color: #ffffff; text-decoration: none;"
            >
              {{ newsletter.cta_label }}
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
